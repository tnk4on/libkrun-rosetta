<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="Shion Tanaka">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <!-- Mobile TOC toggle button -->
  <button class="toc-toggle" id="toc-toggle" aria-label="Open table of contents">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <!-- Overlay backdrop -->
  <div class="toc-overlay" id="toc-overlay"></div>
  <div class="layout">
    <main class="content">
      {{ content }}
    </main>
    <aside class="toc-sidebar" id="toc-sidebar">
      <nav class="toc-nav">
        <button class="toc-close" id="toc-close" aria-label="Close table of contents">&times;</button>
        <a href="https://github.com/tnk4on/libkrun-rosetta" class="github-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
          <span>View on GitHub</span>
        </a>
        <h2 class="toc-title">Contents</h2>
        <ul id="toc-list"></ul>
      </nav>
    </aside>
  </div>
  <footer class="site-footer">
    <p>&copy; 2026 Shion Tanaka. Published under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.</p>
  </footer>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Build TOC from headings
      const headings = document.querySelectorAll('main h2, main h3');
      const tocList = document.getElementById('toc-list');
      if (!headings.length || !tocList) return;

      let currentH2Ul = null;
      headings.forEach(heading => {
        // Ensure heading has an ID
        if (!heading.id) {
          heading.id = heading.textContent.trim().toLowerCase()
            .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
        }
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + heading.id;
        a.textContent = heading.textContent;
        li.appendChild(a);

        if (heading.tagName === 'H2') {
          tocList.appendChild(li);
          currentH2Ul = document.createElement('ul');
          li.appendChild(currentH2Ul);
        } else if (heading.tagName === 'H3' && currentH2Ul) {
          currentH2Ul.appendChild(li);
        }
      });

      // Remove empty sub-lists
      tocList.querySelectorAll('ul:empty').forEach(ul => ul.remove());

      // Scroll spy
      const tocLinks = tocList.querySelectorAll('a');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            tocLinks.forEach(link => link.classList.remove('active'));
            const id = entry.target.getAttribute('id');
            const activeLink = tocList.querySelector('a[href="#' + id + '"]');
            if (activeLink) activeLink.classList.add('active');
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px' });

      headings.forEach(heading => observer.observe(heading));

      // Mobile TOC toggle
      const tocToggle = document.getElementById('toc-toggle');
      const tocClose = document.getElementById('toc-close');
      const tocOverlay = document.getElementById('toc-overlay');
      const tocSidebar = document.getElementById('toc-sidebar');

      function openToc() {
        tocSidebar.classList.add('open');
        tocOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeToc() {
        tocSidebar.classList.remove('open');
        tocOverlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      tocToggle.addEventListener('click', openToc);
      tocClose.addEventListener('click', closeToc);
      tocOverlay.addEventListener('click', closeToc);

      // Close TOC when a link is clicked (mobile)
      tocList.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeToc);
      });
    });
  </script>
</body>
</html>
